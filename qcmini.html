const rim = new THREE.DirectionalLight(0x9fe8dc, 0.55); rim.position.set(-220, 180, -120); scene.add(rim);
const under = new THREE.PointLight(0x6fd8c6, 0.5, 900); under.position.set(0, 60, -220); scene.add(under);

// ---------- materials: clear acrylic ----------
// faces: barely-there glass; edges: brighter cyan "edge-lit" look (face index 1 = extrude sides)
const faceMat = new THREE.MeshPhysicalMaterial({
  color:0xdfeef2, transparent:true, opacity:0.16,
  roughness:0.06, metalness:0, clearcoat:1, clearcoatRoughness:0.08,
  side:THREE.DoubleSide, depthWrite:false
});
const edgeMat = new THREE.MeshPhysicalMaterial({
  color:0x9fe8dc, emissive:0x2e7d70, emissiveIntensity:0.9,
  transparent:true, opacity:0.85, roughness:0.25, metalness:0,
  side:THREE.DoubleSide, depthWrite:false
});

// ---------- build parts ----------
function loopToShapePath(pts, target){
  target.moveTo(pts[0][0], pts[0][1]);
  for(let i=1;i<pts.length;i++) target.lineTo(pts[i][0], pts[i][1]);
  target.closePath();
}
function buildPart(p){
  const shape = new THREE.Shape();
  loopToShapePath(p.outer, shape);
  for(const h of p.holes){
    const hole = new THREE.Path();
    loopToShapePath(h, hole);
    shape.holes.push(hole);
  }
  const geo = new THREE.ExtrudeGeometry(shape, {depth:THICK, bevelEnabled:false, curveSegments:24});
  const mesh = new THREE.Mesh(geo, [faceMat, edgeMat]);
  // crisp outline of cut paths
  const lines = new THREE.LineSegments(
    new THREE.EdgesGeometry(geo, 30),
    new THREE.LineBasicMaterial({color:0xbff2e8, transparent:true, opacity:0.35})
  );
  const g = new THREE.Group();
  g.add(mesh); g.add(lines);
  return g;
}
const root = new THREE.Group();
const parts = GEO.parts.map(p => { const g = buildPart(p); root.add(g); return g; });
scene.add(root);

// ---------- view modes ----------
// part order from parser: [plate, frame]
const MODES = {
  assembled: [ {x:0,z:-THICK}, {x:0,z:0} ],
  exploded:  [ {x:0,z:-22},    {x:0,z:14} ],
  side:      [ {x:-122,z:-THICK/2}, {x:122,z:-THICK/2} ]
};
let target = MODES.exploded.map(o=>({...o}));
function setMode(name){
  target = MODES[name].map(o=>({...o}));
  document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('on', b.dataset.mode===name));
}
document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click', ()=>setMode(b.dataset.mode)));

// ---------- interaction: drag orbit + wheel zoom ----------
let rotX = -0.45, rotZ = 0.35, dist = 330;
let auto = !matchMedia('(prefers-reduced-motion: reduce)').matches;
const spinBtn = document.getElementById('spin');
spinBtn.classList.toggle('on', auto);
spinBtn.addEventListener('click', ()=>{ auto=!auto; spinBtn.classList.toggle('on', auto); });

let dragging=false, px=0, py=0;
const startDrag=(x,y)=>{dragging=true;px=x;py=y;canvas.classList.add('dragging');};
const moveDrag=(x,y)=>{ if(!dragging)return; rotZ += (x-px)*0.006; rotX += (y-py)*0.006; rotX=Math.max(-1.5,Math.min(1.5,rotX)); px=x;py=y; };
const endDrag=()=>{dragging=false;canvas.classList.remove('dragging');};
canvas.addEventListener('mousedown', e=>startDrag(e.clientX,e.clientY));
addEventListener('mousemove', e=>moveDrag(e.clientX,e.clientY));
addEventListener('mouseup', endDrag);
canvas.addEventListener('touchstart', e=>{ if(e.touches.length===1) startDrag(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
canvas.addEventListener('touchmove', e=>{ if(e.touches.length===1) moveDrag(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
canvas.addEventListener('touchend', endDrag);
canvas.addEventListener('wheel', e=>{ e.preventDefault(); dist=Math.max(140,Math.min(900, dist*(1+e.deltaY*0.001))); }, {passive:false});

// ---------- resize ----------
function resize(){
  const w=document.documentElement.clientWidth, h=document.documentElement.clientHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();

// ---------- animate ----------
const clock = new THREE.Clock();
function tick(){
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);
  if(auto && !dragging) rotZ += dt*0.25;
  root.rotation.x = rotX;
  root.rotation.z = rotZ;
  camera.position.set(0, -dist*Math.cos(0.55), dist*Math.sin(0.55)+40);
  camera.lookAt(0,0,0);
  // ease parts toward mode targets
  parts.forEach((g,i)=>{
    g.position.x += (target[i].x - g.position.x)*Math.min(1, dt*5);
    g.position.z += (target[i].z - g.position.z)*Math.min(1, dt*5);
  });
  renderer.render(scene, camera);
}
tick();
</script>
</body>
</html>
