<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Order Confirmed — StompGuard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root {
  --black:     #080808;
  --surface:   #111111;
  --surface2:  #1a1a1a;
  --gunmetal:  #2a2a2a;
  --chrome:    #C8C8C8;
  --chrome-hi: #E8E8E8;
  --chrome-lo: #888888;
  --red:       #8B0000;
  --red-hi:    #B00000;
  --text:      #F0F0F0;
  --muted:     #777777;
  --font-head: 'Bebas Neue', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
  --font-body: 'Inter', sans-serif;
}

body {
  background: var(--black);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  cursor: crosshair;
  max-width: 1920px;
  margin: 0 auto;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 9998;
}

.success-card {
  background: var(--surface);
  border: 1px solid rgba(200,200,200,0.08);
  max-width: 520px;
  width: 100%;
  padding: 3rem;
  text-align: center;
  clip-path: polygon(0 0, calc(100% - 24px) 0, 100% 24px, 100% 100%, 24px 100%, 0 calc(100% - 24px));
  position: relative;
}

.success-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--chrome), var(--red), var(--chrome), transparent);
}

.success-icon {
  font-size: 3rem;
  margin-bottom: 1.5rem;
  display: block;
}

.success-eyebrow {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 0.8rem;
}

.success-title {
  font-family: var(--font-head);
  font-size: 3rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--chrome-hi);
  line-height: 1;
  margin-bottom: 1.2rem;
}

.success-body {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.8;
  letter-spacing: 0.03em;
  margin-bottom: 2rem;
  max-width: 360px;
  margin-left: auto;
  margin-right: auto;
}

.btn-home {
  display: inline-block;
  background: var(--red);
  color: var(--chrome-hi);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 14px 32px;
  text-decoration: none;
  border: 1px solid var(--red-hi);
  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  transition: background 0.2s;
}

.btn-home:hover { background: var(--red-hi); }

.success-meta {
  margin-top: 1.5rem;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  opacity: 0.5;
  text-transform: uppercase;
}
</style>
</head>
<body>
  <div class="success-card">
    <span class="success-icon">✓</span>
    <div class="success-eyebrow">Order Confirmed</div>
    <h1 class="success-title">You're Protected.</h1>
    <p class="success-body">
      Your StompGuard order is confirmed. A receipt has been sent to your email. We'll get your gear protection shipped out fast.
    </p>
    <a href="/" class="btn-home">Back to StompGuard →</a>
    <div class="success-meta">Thank you for your order · StompGuard</div>
  </div>
</body>
</html>
