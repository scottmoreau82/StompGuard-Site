<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StompGuard Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #080808;
      --surface: #111111;
      --surface2: #1a1a1a;
      --gunmetal: #2a2a2a;
      --chrome: #C8C8C8;
      --chrome-hi: #E8E8E8;
      --red: #8B0000;
      --red-hi: #B00000;
      --text: #F0F0F0;
      --muted: #777777;
    }
    body {
      background: var(--black);
      color: var(--text);
      font: 400 14px/1.5 Inter, sans-serif;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    input, button, select {
      font: inherit;
      color: inherit;
      background: var(--surface2);
      border: 1px solid var(--gunmetal);
      padding: 8px 12px;
      border-radius: 4px;
    }
    button {
      background: var(--red);
      color: #fff;
      cursor: pointer;
      border: none;
      font-weight: 500;
      transition: background 0.2s;
    }
    button:hover { background: var(--red-hi); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-page {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: var(--surface);
      padding: 40px;
      border-radius: 8px;
      width: 100%;
      max-width: 340px;
      border: 1px solid var(--gunmetal);
    }
    .login-box h1 {
      font-size: 24px;
      margin-bottom: 30px;
      text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 1px;
    }
    .form-group {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
    }
    .form-group label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      color: var(--muted);
    }
    .form-group input {
      padding: 10px 12px;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
    }
    .error {
      background: rgba(139, 0, 0, 0.2);
      color: #ff6b6b;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
    }
    .error.show { display: block; }

    .dashboard {
      display: none;
      min-height: 100vh;
      background: var(--black);
    }
    .admin-header {
      background: var(--surface);
      border-bottom: 1px solid var(--gunmetal);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .admin-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
    }
    .admin-header button {
      padding: 8px 16px;
      font-size: 13px;
    }
    .admin-nav {
      background: var(--surface2);
      border-bottom: 1px solid var(--gunmetal);
      padding: 0;
      display: flex;
    }
    .admin-nav button {
      background: transparent;
      color: var(--muted);
      border: none;
      padding: 16px 24px;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .admin-nav button:hover {
      color: var(--text);
      background: transparent;
    }
    .admin-nav button.active {
      color: var(--red);
      border-bottom-color: var(--red);
    }
    .admin-content {
      padding: 40px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .section {
      display: none;
    }
    .section.active { display: block; }
    .section h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 1px;
      margin-bottom: 24px;
    }

    .table-container {
      overflow-x: auto;
      background: var(--surface);
      border: 1px solid var(--gunmetal);
      border-radius: 4px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      background: var(--surface2);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--gunmetal);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
      color: var(--muted);
    }
    td {
      padding: 12px;
      border-bottom: 1px solid var(--gunmetal);
    }
    tr:hover { background: var(--surface2); }
    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-completed { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
    .status-pending { background: rgba(255, 193, 7, 0.2); color: #FFC107; }
    .loading { opacity: 0.6; }
    .error-msg { color: #ff6b6b; }
    .success-msg { color: #4CAF50; }
  </style>
</head>
<body>

<div class="login-page" id="loginPage">
  <div class="login-box">
    <h1>StompGuard Admin</h1>
    <div class="error" id="loginError"></div>
    <form id="loginForm" onsubmit="login(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit">Sign In</button>
    </form>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="admin-header">
    <h1>StompGuard Admin</h1>
    <button onclick="logout()">Logout</button>
  </div>
  
  <div class="admin-nav">
    <button class="active" onclick="switchTab('orders')">Orders</button>
    <button onclick="switchTab('products')">Products</button>
    <button onclick="switchTab('export')">Export</button>
  </div>

  <div class="admin-content">
    <!-- ORDERS SECTION -->
    <div class="section active" id="orders">
      <h2>Orders</h2>
      <div style="margin-bottom: 20px; display: flex; gap: 12px;">
        <input type="date" id="filterDate" onchange="loadOrders()">
        <input type="text" id="filterEmail" placeholder="Filter by email..." onchange="loadOrders()">
        <select id="filterStatus" onchange="loadOrders()">
          <option value="">All Statuses</option>
          <option value="completed">Completed</option>
          <option value="pending">Pending</option>
        </select>
      </div>
      <div class="table-container" id="ordersContainer">
        <table>
          <thead>
            <tr>
              <th>Order #</th>
              <th>Date</th>
              <th>Customer</th>
              <th>Email</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Stripe ID</th>
            </tr>
          </thead>
          <tbody id="ordersTable">
            <tr><td colspan="7" style="text-align:center; padding: 40px;">Loading orders...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- PRODUCTS SECTION -->
    <div class="section" id="products">
      <h2>Products</h2>
      <div style="margin-bottom: 20px;">
        <button onclick="document.getElementById('editProductModal').style.display='block'">+ Add Product</button>
      </div>
      <div class="table-container" id="productsContainer">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>SKU</th>
              <th>Price</th>
              <th>Stripe ID</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTable">
            <tr><td colspan="5" style="text-align:center; padding: 40px;">Loading products...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- EXPORT SECTION -->
    <div class="section" id="export">
      <h2>Export Data</h2>
      <div style="display: grid; gap: 12px;">
        <button onclick="exportOrdersCSV()" style="padding: 12px; width: 200px;">Export Orders (CSV)</button>
        <button onclick="exportOrdersPDF()" style="padding: 12px; width: 200px;">Export Orders (PDF)</button>
      </div>
      <p style="margin-top: 20px; color: var(--muted); font-size: 13px;">
        All orders within the current filters will be exported.
      </p>
    </div>
  </div>
</div>

<script>
const API_BASE = '/admin';

// ─── Login ───
async function login(e) {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorDiv = document.getElementById('loginError');
  
  errorDiv.classList.remove('show');
  
  try {
    const res = await fetch(`${API_BASE}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('sg_token', data.token);
      showDashboard();
      loadOrders();
      loadProducts();
    } else {
      errorDiv.textContent = data.error || 'Login failed';
      errorDiv.classList.add('show');
    }
  } catch (err) {
    errorDiv.textContent = 'Error: ' + err.message;
    errorDiv.classList.add('show');
  }
}

async function logout() {
  if (confirm('Logout?')) {
    localStorage.removeItem('sg_token');
    location.reload();
  }
}

// ─── UI Navigation ───
function showDashboard() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('dashboard').style.display = 'flex';
  document.getElementById('dashboard').style.flexDirection = 'column';
}

function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.admin-nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
}

// ─── Orders ───
async function loadOrders() {
  const token = localStorage.getItem('sg_token');
  if (!token) return;
  
  const date = document.getElementById('filterDate').value;
  const email = document.getElementById('filterEmail').value;
  const status = document.getElementById('filterStatus').value;
  
  let url = `${API_BASE}/orders?token=${encodeURIComponent(token)}`;
  if (date) url += `&date=${date}`;
  if (email) url += `&email=${encodeURIComponent(email)}`;
  if (status) url += `&status=${status}`;
  
  try {
    const res = await fetch(url);
    const data = await res.json();
    
    if (res.ok && data.orders) {
      const tbody = document.getElementById('ordersTable');
      if (data.orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 20px; color: var(--muted);">No orders found</td></tr>';
      } else {
        tbody.innerHTML = data.orders.map(o => `
          <tr>
            <td><code style="color: var(--chrome);">${o.order_number}</code></td>
            <td>${new Date(o.created_at).toLocaleDateString()}</td>
            <td>${o.customer_name}</td>
            <td>${o.customer_email}</td>
            <td>$${(o.amount / 100).toFixed(2)}</td>
            <td><span class="status-badge status-${o.status}">${o.status}</span></td>
            <td><code style="font-size: 11px;">${o.stripe_session_id.slice(0, 12)}...</code></td>
          </tr>
        `).join('');
      }
    }
  } catch (err) {
    document.getElementById('ordersTable').innerHTML = `<tr><td colspan="7" style="color: #ff6b6b; text-align: center;">${err.message}</td></tr>`;
  }
}

// ─── Products ───
async function loadProducts() {
  const token = localStorage.getItem('sg_token');
  if (!token) return;
  
  try {
    const res = await fetch(`${API_BASE}/products?token=${encodeURIComponent(token)}`);
    const data = await res.json();
    
    if (res.ok && data.products) {
      const tbody = document.getElementById('productsTable');
      tbody.innerHTML = data.products.map(p => `
        <tr>
          <td>${p.name}</td>
          <td><code style="color: var(--chrome);">${p.sku}</code></td>
          <td>$${p.price.toFixed(2)}</td>
          <td><code style="font-size: 11px;">${p.stripe_id}</code></td>
          <td>
            <button onclick="editProduct('${p.sku}')" style="padding: 4px 8px; font-size: 11px;">Edit</button>
            <button onclick="deleteProduct('${p.sku}')" style="padding: 4px 8px; font-size: 11px; background: var(--gunmetal);">Delete</button>
          </td>
        </tr>
      `).join('');
    }
  } catch (err) {
    document.getElementById('productsTable').innerHTML = `<tr><td colspan="5" style="color: #ff6b6b;">${err.message}</td></tr>`;
  }
}

function editProduct(sku) {
  alert('Edit product: ' + sku + '\n\n(Feature coming soon)');
}

function deleteProduct(sku) {
  if (confirm(`Delete product ${sku}?`)) {
    alert('Delete: ' + sku + '\n\n(Feature coming soon)');
  }
}

// ─── Export ───
async function exportOrdersCSV() {
  const token = localStorage.getItem('sg_token');
  const date = document.getElementById('filterDate').value;
  const email = document.getElementById('filterEmail').value;
  const status = document.getElementById('filterStatus').value;
  
  let url = `${API_BASE}/export/orders?format=csv&token=${encodeURIComponent(token)}`;
  if (date) url += `&date=${date}`;
  if (email) url += `&email=${encodeURIComponent(email)}`;
  if (status) url += `&status=${status}`;
  
  window.location.href = url;
}

async function exportOrdersPDF() {
  alert('PDF export coming soon');
}

// ─── Init ───
window.addEventListener('load', () => {
  const token = localStorage.getItem('sg_token');
  if (token) {
    showDashboard();
    loadOrders();
    loadProducts();
  }
});
</script>

</body>
</html>
